services:
  web:
    container_name: feverish-web
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgres://feverish:${DB_PASSWORD}@db:5432/feverish
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - DJANGO_ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - npm_proxy

  worker:
    build: .
    restart: unless-stopped
    command: /bin/bash /app/scripts/background_refresh.sh
    environment:
      - DATABASE_URL=postgres://feverish:${DB_PASSWORD}@db:5432/feverish
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=feverish
      - POSTGRES_USER=feverish
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feverish"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
  npm_proxy:
    external: true
